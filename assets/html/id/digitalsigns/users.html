{!css(<link href="assets/vendor/bootstrap-daterangepicker/daterangepicker.css" rel="stylesheet">)}

<input type="hidden" name="id" value="{!id_digitalsign_users}">
<input type="hidden" name="api_key" value="{!api_key}">

<div class="container content-main">
    <div class="page-hero page-hero-sm">
        <h1 class="page-title">Pengguna Tanda Tangan Digital</h1>
        <p class="page-subtitle">Lengkapi informasi untuk proses verifikasi dan tanda tangan.</p>
    </div>

    <div class="card">
        <div class="card-header">Detail Pengguna</div>
        <table class="table table-hover table-bordered">
        <tr>
            <td><b>Nama</b></td>
            <td><input type="text" class="form-control" name="dsu-name" placeholder="Nama"></td>
        </tr>
        <tr>
            <td><b>Telepon</b></td>
            <td><input type="text" class="form-control" name="dsu-phone" placeholder="Telepon"></td>
        </tr>
        <tr>
            <td><b>Email</b></td>
            <td><input type="text" class="form-control" name="dsu-email" placeholder="Email"></td>
        </tr>
        <tr>
            <td><b>Tipe pengguna</b></td>
            <td>
                <select name="dsu-type" class="form-control" id="dsu-type">
                    <option value="INDIVIDUAL">INDIVIDU</option>
                    <option value="ORGANIZATION">ORGANISASI</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><b>NIK</b></td>
            <td><input type="text" class="form-control" name="dsu-ktp" placeholder="Nomor Identitas"></td>
        </tr>
        <tr>
            <td><b>NPWP</b></td>
            <td><input type="text" class="form-control" name="dsu-npwp" placeholder="Nomor NPWP"></td>
        </tr>
        <tr>
            <td><b>Alamat</b></td>
            <td><input type="text" class="form-control" name="dsu-address" placeholder="Alamat"></td>
        </tr>
        <tr>
            <td><b>Kota</b></td>
            <td><input type="text" class="form-control" name="dsu-city" placeholder="Kota"></td>
        </tr>
        <tr>
            <td><b>Provinsi</b></td>
            <td><input type="text" class="form-control" name="dsu-province" placeholder="Provinsi"></td>
        </tr>
        <tr>
            <td><b>Jenis kelamin</b></td>
            <td>
                <select name="dsu-gender" class="form-control" id="dsu-gender">
                    <option value="F">Perempuan</option>
                    <option value="M">Laki-laki</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><b>Tempat lahir</b></td>
            <td><input type="text" class="form-control" name="dsu-place_of_birth" placeholder="Tempat lahir"></td>
        </tr>
        <tr>
            <td><b>Tanggal lahir</b></td>
            <td><input type="text" class="form-control" name="dsu-date_of_birth" placeholder="Tanggal lahir"></td>
        </tr>
        <tr>
            <td><b>Unit organisasi</b></td>
            <td><input type="text" class="form-control" name="dsu-org_unit" placeholder="Unit organisasi"></td>
        </tr>
        <tr>
            <td><b>Unit kerja</b></td>
            <td><input type="text" class="form-control" name="dsu-work_unit" placeholder="Unit kerja"></td>
        </tr>
        <tr>
            <td><b>Posisi</b></td>
            <td><input type="text" class="form-control" name="dsu-position" placeholder="Posisi"></td>
        </tr>
        </table>

        <button class="btn btn-primary" name="submit" type="submit">Simpan perubahan</button>
    </div>

</div>

{!js(
<script src="assets/vendor/bootstrap-daterangepicker/moment.min.js"></script>
<script src="assets/vendor/bootstrap-daterangepicker/daterangepicker.js"></script>
)}

{!js(<script src="assets/script/auth.js"></script>)}
{!js(<script src="assets/script/digitalsigns/users.js"></script>)}
