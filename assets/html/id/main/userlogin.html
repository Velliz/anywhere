{!css(
<link href="assets/global/css/login.css" rel="stylesheet">)}

<div class="login-page">
    <div class="form">
        <h3 class="auth-title">Masuk ke Anywhere</h3>
        <hr>
        <div>
            <div class="alert alert-danger ajax-login-error" style="display: none;">
                <strong class="ajax-login-error-message"></strong>
            </div>
            <div class="alert alert-success ajax-register-success" style="display: none;">
                <strong>Pendaftaran berhasil.<br>Silakan masuk untuk melanjutkan.</strong>
            </div>

            <input type="text" name="username" placeholder="Nama pengguna" value="{!username}" required/>
            <input type="password" name="password" placeholder="Kata sandi" required/>
            <br/>
            <button type="submit" name="login-submit" class="login-submit">Masuk</button>

            <p class="message">Belum punya akun? <a href="{!url()}register">Daftar sekarang</a></p>
        </div>
    </div>
</div>

{!js(
<script src="assets/script/login.js"></script>)}
