{!css(<!-- place your custom CSS file here -->)}

<div class="container content-main">
    <div class="page-hero page-hero-sm">
        <h1 class="page-title">Profil Anda</h1>
        <p class="page-subtitle">Informasi akun dan akses API Anda.</p>
    </div>

    <div class="card">
        <div class="card-header">Detail Akun</div>
        <table class="table table-hover table-bordered">
            <tr>
                <td><b>ID</b></td>
                <td>#<span class="profile-id"></span></td>
            </tr>
            <tr>
                <td><b>Nama pengguna</b></td>
                <td><span class="profile-username"></span></td>
            </tr>
            <tr>
                <td><b>Nama tampilan</b></td>
                <td><span class="profile-name"></span></td>
            </tr>
            <tr>
                <td><b>Status</b></td>
                <td><span class="profile-status"></span></td>
            </tr>
            <tr>
                <td><b>Batasan</b></td>
                <td><span class="profile-limitations"></span> template</td>
            </tr>
            <tr>
                <td><b>Kunci API</b></td>
                <td><span class="profile-api_key"></span></td>
            </tr>
        </table>
    </div>
</div>
