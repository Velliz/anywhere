{!css(<!-- place your custom CSS file here -->)}

<div class="container content-main">
    <div class="page-hero page-hero-sm">
        <h1 class="page-title">Variabel Global</h1>
        <p class="page-subtitle">Simpan nilai global untuk digunakan di seluruh template.</p>
    </div>

    <div class="row">
        <div class="col-lg-4">
            <form class="card" action="" method="post">
                <div class="form-group">
                    <label>Kunci</label>
                    <input onkeyup="this.value = this.value.toUpperCase();" type="text" class="form-control" name="key" placeholder="kunci"/>
                    <p class="help-block">*Kunci bersifat unik dan tidak bisa diganti setelah disimpan.</p>
                </div>
                <div class="form-group">
                    <label>Nilai</label>
                    <textarea name="val" cols="10" rows="2" class="form-control" placeholder="nilai...."></textarea>
                </div>
                <p>Panggil variabel global di template dengan tag <b>{ ! var( VAR_KEY ) }</b></p>
                <input type="submit" name="action" value="Simpan" class="btn btn-primary" />
            </form>
        </div>
        <div class="col-lg-4">
        </div>
    </div>

    <hr />

    <h1 class="section-title">Variabel Tersedia ({!total})</h1>

    <br/>

    <div class="row">
        <div class="col-lg-12">
            <!--{!constanta}-->
            <form class="form-inline card" action="" method="post">
                <input type="hidden" name="constID" value="{!constID}">
                <div class="form-group">
                    <label>Kunci</label>
                    <input readonly="readonly" type="text" class="form-control" name="key" placeholder="kunci" value="{!uniquekey}"/>
                </div>
                <div class="form-group">
                    <label>Nilai</label>
                    <input name="val" class="form-control" placeholder="nilai...." value="{!constantaval}">
                </div>
                <input type="submit" name="action" value="Perbarui" class="btn btn-primary"/>
            </form>
            <br/>
            <!--{/constanta}-->
        </div>
    </div>

    <hr/>

</div>

{!js(<!-- place your custom JavaScript file here -->)}
